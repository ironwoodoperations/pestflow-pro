<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PestFlow Pro \u2014 Animated Walkthrough</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { position: absolute; inset: 0; }
  /* Cursor blink keyframes used by content editor scene */
  @keyframes pfBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0B1426">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0B1426"/>
      <g transform="translate(420, 240)">
        <rect width="360" height="320" rx="56" fill="url(#g)"/>
        <text x="180" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="220" font-weight="800" fill="#04231E" letter-spacing="-8">P</text>
      </g>
      <text x="600" y="640" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="-1">PestFlow Pro</text>
      <text x="600" y="685" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0FB39A" letter-spacing="4">WALKTHROUGH</text>
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0FB39A"/>
          <stop offset="100%" stop-color="#1FE0BC"/>
        </linearGradient>
      </defs>
    </svg>
  </template>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="scenes-a.jsx"></script>
  <script type="text/babel" src="scenes-b.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
