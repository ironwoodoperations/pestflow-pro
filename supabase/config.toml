[functions.provision-tenant]
verify_jwt = false

# S255 — secret WRITE path → Vault. verify_jwt=true so the gateway rejects
# anonymous calls; the function then re-derives the user and calls
# set_tenant_secret with the USER's JWT so auth.uid() drives the in-RPC
# tenant-ownership check (never service-role — that would fail open).
[functions.set-tenant-secret]
verify_jwt = true

# Internal/cron/webhook callers authenticated by in-source secret comparison
# (apikey header == <FN>_INTERNAL_SECRET edge secret), NOT a user JWT. Pin
# verify_jwt=false so a future CLI redeploy can't flip it on and 401 their
# legitimate (JWT-less) callers. Values confirmed against the deployed state.
[functions.process-sms-queue]
verify_jwt = false
[functions.publish-scheduled-posts]
verify_jwt = false
[functions.notify-new-lead]
verify_jwt = false

# ga4-analytics / gsc-analytics authenticate the END USER's JWT (requireTenantUser
# gate for interactive "Run Now") and read the service_role `role` claim from an
# already-signature-verified token for the cron path — same rationale as
# set-tenant-secret. They are USER-JWT callers, NOT internal-secret callers, so
# verify_jwt=true. Pinned to match the deployed state (both confirmed true).
[functions.ga4-analytics]
verify_jwt = true
[functions.gsc-analytics]
verify_jwt = true

[functions.outscraper-reviews]
verify_jwt = false
[functions.places-reviews]
verify_jwt = true

# S242 — AI Campaign Auto-Attach (Session 1)
# ai-proxy verify_jwt pinned false: it validates the user JWT inline on the
# public route (requireAiCaller) and uses HMAC delegation envelopes on /internal
# (which carry no JWT — a gateway 'true' would reject those service calls).
[functions.ai-proxy]
verify_jwt = false
[functions.generate-social-batch]
verify_jwt = true
[functions.process-campaign-job]
verify_jwt = false
[functions.tag-image-vision]
verify_jwt = false

# S245 — one-click tenant offboard
[functions.offboard-tenant]
verify_jwt = true
[functions.process-offboard-queue]
verify_jwt = false

# S253/A1 — AI Authority Score. Worker + two sibling proxies authenticate via the
# X-Internal-Secret header (== AI_AUTHORITY_INTERNAL_SECRET edge secret), NOT a
# Supabase JWT. Pin verify_jwt=false so a future CLI redeploy can't flip it on and
# 401 the internal callers.
[functions.ai-authority-worker]
verify_jwt = false
[functions.ai-authority-perplexity]
verify_jwt = false
[functions.ai-authority-openai]
verify_jwt = false

# S257 — lead-bridge-dispatch. Invoked (fire-and-forget via pg_net) by the
# trigger_lead_bridge_dispatch() / reconcile_lead_bridge_queue() DB callers,
# which present the hop-1 `apikey` (Vault: lead_bridge_dispatch_internal_secret),
# NOT a user JWT. verify_jwt=false so the gateway can't 401 those JWT-less calls.
[functions.lead-bridge-dispatch]
verify_jwt = false

# S259/S260 — generate-monthly-report. Async report worker invoked
# server-to-server by the report-queue cron (pg_net), which presents the
# `apikey` header (GENERATE_MONTHLY_REPORT_INTERNAL_SECRET, timing-safe), NOT a
# user JWT. verify_jwt=false so a future CLI redeploy can't flip it on and 401
# those JWT-less internal calls.
[functions.generate-monthly-report]
verify_jwt = false
