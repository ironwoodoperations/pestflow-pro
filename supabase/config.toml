[functions.provision-tenant]
verify_jwt = false

# S255 — secret WRITE path → Vault. verify_jwt=true so the gateway rejects
# anonymous calls; the function then re-derives the user and calls
# set_tenant_secret with the USER's JWT so auth.uid() drives the in-RPC
# tenant-ownership check (never service-role — that would fail open).
[functions.set-tenant-secret]
verify_jwt = true

[functions.outscraper-reviews]
verify_jwt = false
[functions.places-reviews]
verify_jwt = true

# S242 — AI Campaign Auto-Attach (Session 1)
# ai-proxy verify_jwt pinned false: it validates the user JWT inline on the
# public route (requireAiCaller) and uses HMAC delegation envelopes on /internal
# (which carry no JWT — a gateway 'true' would reject those service calls).
[functions.ai-proxy]
verify_jwt = false
[functions.generate-social-batch]
verify_jwt = true
[functions.process-campaign-job]
verify_jwt = false
[functions.tag-image-vision]
verify_jwt = false

# S245 — one-click tenant offboard
[functions.offboard-tenant]
verify_jwt = true
[functions.process-offboard-queue]
verify_jwt = false

# S253/A1 — AI Authority Score. Worker + two sibling proxies authenticate via the
# X-Internal-Secret header (== AI_AUTHORITY_INTERNAL_SECRET edge secret), NOT a
# Supabase JWT. Pin verify_jwt=false so a future CLI redeploy can't flip it on and
# 401 the internal callers.
[functions.ai-authority-worker]
verify_jwt = false
[functions.ai-authority-perplexity]
verify_jwt = false
[functions.ai-authority-openai]
verify_jwt = false
