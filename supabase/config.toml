[functions.provision-tenant]
verify_jwt = false

[functions.outscraper-reviews]
verify_jwt = false
[functions.places-reviews]
verify_jwt = true

# S242 — AI Campaign Auto-Attach (Session 1)
# ai-proxy verify_jwt pinned false: it validates the user JWT inline on the
# public route (requireAiCaller) and uses HMAC delegation envelopes on /internal
# (which carry no JWT — a gateway 'true' would reject those service calls).
[functions.ai-proxy]
verify_jwt = false
[functions.generate-social-batch]
verify_jwt = true
[functions.process-campaign-job]
verify_jwt = false
[functions.tag-image-vision]
verify_jwt = false

# S245 — one-click tenant offboard
[functions.offboard-tenant]
verify_jwt = true
[functions.process-offboard-queue]
verify_jwt = false
