name: Redeploy edge functions on _shared change

# ── WHY THIS EXISTS (S273 root-cause fix) ────────────────────────────────────
# Supabase bundles supabase/functions/_shared/** into each function AT DEPLOY TIME.
# Editing a shared file (e.g. _shared/auth/requireTenantUser.ts) does NOT hot-update
# already-deployed functions — every consumer must be redeployed to pick up the change.
#
# In S273 a shared-auth fix (read role from tenant_users, not the dropped
# profiles.role) landed on main, but the consumer functions were never redeployed.
# Production kept running the STALE bundle, which selected the dropped profiles.role
# column → PostgREST error → AuthError(403 "Forbidden") on every user-context edge
# function. This workflow propagates any _shared change to all consumers so a
# shared-file edit can never again silently leave stale bundles behind.
#
# ── verify_jwt SAFETY ────────────────────────────────────────────────────────
# verify_jwt is set EXPLICITLY per function below (matching each function's deployed
# platform setting), NOT inherited from config.toml. This guarantees a redeploy can
# never flip a function's gateway JWT setting — and it intentionally preserves the
# known places-reviews drift (config.toml says true; the platform is false) by forcing
# false via --no-verify-jwt, without editing config.toml.
#
# When you add a new _shared consumer, add it to exactly ONE list below (matching its
# deployed verify_jwt). Keep these lists the single source of truth for this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/_shared/**'
  workflow_dispatch: {}   # manual run — e.g. to repair stale bundles on demand

concurrency:
  group: redeploy-edge-shared
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: biezzykcgzkrwdgqpsar
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require deploy token
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Pass 1 — consumers whose deployed verify_jwt is TRUE (user-JWT callers).
      # No flag: the gateway default (true) is what these require.
      - name: Redeploy verify_jwt=true consumers
        run: |
          set -euo pipefail
          for fn in apply-finding-fix create-upgrade-session zernio-analytics \
                    gsc-analytics ga4-analytics generate-social-batch \
                    seo-analytics pagespeed-proxy; do
            echo "::group::deploy $fn (verify_jwt=true)"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done

      # Pass 2 — consumers whose deployed verify_jwt is FALSE. These do their own auth
      # inline (requireTenantUser reads the bearer token itself) or carry non-JWT
      # internal credentials, so the gateway check must stay OFF. --no-verify-jwt is
      # explicit so a redeploy can never turn it on.
      - name: Redeploy verify_jwt=false consumers
        run: |
          set -euo pipefail
          for fn in ai-proxy notify-upgrade post-to-social tag-image-vision \
                    notify-support-ticket list-checkout-sessions \
                    places-reviews outscraper-reviews; do
            echo "::group::deploy $fn (verify_jwt=false)"
            supabase functions deploy "$fn" --no-verify-jwt --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Show resulting versions + verify_jwt
        run: supabase functions list --project-ref "$PROJECT_REF"
