name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # S243 W1 — fail the build if any browser-direct Anthropic reference
      # reappears. All AI calls must route through ai-proxy via callAi().
      - name: Guard — no browser-direct Anthropic calls
        run: |
          if grep -rEn "api\.anthropic\.com|VITE_ANTHROPIC" src/; then
            echo "::error::Forbidden Anthropic-direct reference in src/. Route AI calls through ai-proxy (src/lib/ai/callAi.ts)."
            exit 1
          fi
          echo "ai-proxy guard passed: no api.anthropic.com / VITE_ANTHROPIC in src/"
