name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # S243 W1 (widened) — fail the build if any direct Anthropic reference
      # reappears in frontend OR edge functions. All AI calls must route through
      # ai-proxy (frontend via callAi(); server via ai-proxy public/internal).
      # ai-proxy itself is the one authorized direct caller, so it is excluded.
      # The domain pattern requires the https:// scheme so it matches real API
      # calls (always https://api.anthropic.com/v1/messages) without false-
      # positiving on doc comments like "never calls api.anthropic.com" that
      # live in functions outside the authorized edit set.
      - name: Guard — no direct Anthropic calls
        run: |
          if grep -rEn "https://api\.anthropic\.com|VITE_ANTHROPIC" src/ supabase/functions/ --exclude-dir=ai-proxy; then
            echo "::error::Forbidden Anthropic-direct reference. Route AI calls through ai-proxy (frontend: src/lib/ai/callAi.ts; server: ai-proxy public/internal route)."
            exit 1
          fi
          echo "ai-proxy guard passed: no direct api.anthropic.com / VITE_ANTHROPIC in src/ or supabase/functions/ (excluding ai-proxy)"

  # S273 — TENANT-ISOLATION GATE (Principle 7). Spins up a real local Supabase stack
  # and runs the Deno cross-tenant isolation test against requireTenantUser — the SSOT
  # auth boundary all 18 tenant-context edge functions funnel through. This is the first
  # test-runner step in CI (previously only tsc/lint/grep ran). The test mints a REAL
  # member-of-A JWT and asserts a request for tenant B returns 403 — authenticated
  # context, not service-role bypass.
  auth-isolation-test:
    name: Auth isolation (Deno + local Supabase)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # The repo's full migration history is NOT replayable from zero (e.g.
      # 20260405_fix_rls_policies.sql references stripe_payments, never created by an
      # earlier migration — it exists only on the live remote). requireTenantUser
      # reads ONLY tenant_users, so we replace the migration set with a focused
      # fixture and run against real Postgres + GoTrue. Replayable full-history
      # migrations are a separate pre-existing cleanup, out of scope for this PR.
      # The repo's full migration history is NOT replayable from zero (e.g.
      # 20260405_fix_rls_policies.sql references stripe_payments, never created by an
      # earlier migration — it exists only on the live remote). So we stage a focused
      # fixture, then apply the REAL PR #2a migration on top (so pgTAP exercises the
      # actual role-gated RLS, helper, hardening + drift view — not a copy).
      - name: Stage focused test schema + real PR #2a migration
        run: |
          mkdir -p /tmp/stage
          cp supabase/tests/fixtures/00000000000001_iso_min_schema.sql /tmp/stage/
          cp supabase/migrations/20260618000000_s273_pr2a_permission_foundation.sql /tmp/stage/
          rm -rf supabase/migrations
          mkdir -p supabase/migrations
          cp /tmp/stage/* supabase/migrations/

      - name: Start local Supabase
        run: supabase start

      - name: Export local Supabase env
        run: |
          supabase status -o env > .supabase-status.env
          echo "SUPABASE_URL=$(grep -E '^API_URL=' .supabase-status.env | cut -d= -f2- | tr -d '\"')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(grep -E '^SERVICE_ROLE_KEY=' .supabase-status.env | cut -d= -f2- | tr -d '\"')" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$(grep -E '^ANON_KEY=' .supabase-status.env | cut -d= -f2- | tr -d '\"')" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_URL=$(grep -E '^DB_URL=' .supabase-status.env | cut -d= -f2- | tr -d '\"')" >> "$GITHUB_ENV"
          rm -f .supabase-status.env

      # --no-check: this job verifies RUNTIME behaviour, not types. Deno's type-checker
      # follows the esm.sh supabase-js types into a @types/node reference it can't
      # resolve without node_modules; src/ type safety is covered by the Validate tsc.
      - name: Run cross-tenant isolation test (Deno)
        run: deno test --no-check --allow-net --allow-env supabase/functions/_shared/auth/

      # S273 PR #2a — pgTAP: role-gated content-table RLS. Asserts a 'user' member
      # cannot INSERT/UPDATE/DELETE content surfaces, 'manager'/'admin' can, and the
      # binding-drift view excludes the operator seed. Runs in authenticated context
      # (SET ROLE authenticated + jwt claims), not as the RLS-bypassing superuser.
      - name: Run role-RLS test (pgTAP)
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/pr2a_permissions.pgtap.sql > pgtap.out 2>&1 || { echo '--- pgTAP output ---'; cat pgtap.out; exit 1; }
          echo '--- pgTAP output ---'; cat pgtap.out
          if grep -qE '^not ok' pgtap.out; then echo '::error::pgTAP role-RLS assertions failed'; exit 1; fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
